<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --base: #1e1e2e;
      --mantle: #181825;
      --surface0: #313244;
      --surface1: #45475a;
      --overlay0: #6c7086;
      --text: #cdd6f4;
      --subtext0: #a6adc8;
      --subtext1: #bac2de;
      --peach: #fab387;
      --yellow: #f9e2af;
      --green: #a6e3a1;
      --red: #f38ba8;
      --mauve: #cba6f7;
      --blue: #89b4fa;
      --lavender: #b4befe;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: var(--base);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      font-size: 12px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--surface0);
    }

    .header .fuel { font-size: 18px; }
    .header .title { font-weight: 700; color: var(--peach); font-size: 14px; }
    .header .version { color: var(--overlay0); font-size: 10px; margin-left: auto; }

    .section-title {
      color: var(--mauve);
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 12px 0 8px;
    }

    .limit-row {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
      gap: 8px;
    }

    .limit-label {
      color: var(--subtext0);
      width: 70px;
      font-size: 11px;
      flex-shrink: 0;
    }

    .bar-container {
      flex: 1;
      height: 8px;
      background: var(--surface0);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease, background-color 0.3s ease;
    }

    .bar-fill.ok { background: var(--green); }
    .bar-fill.warn { background: var(--yellow); }
    .bar-fill.crit { background: var(--red); }

    .limit-pct {
      width: 36px;
      text-align: right;
      font-weight: 700;
      font-size: 11px;
    }

    .limit-pct.ok { color: var(--green); }
    .limit-pct.warn { color: var(--yellow); }
    .limit-pct.crit { color: var(--red); }

    .limit-reset {
      color: var(--overlay0);
      font-size: 10px;
      width: 52px;
      text-align: right;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .stat-card {
      background: var(--mantle);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .stat-label {
      color: var(--overlay0);
      font-size: 10px;
      margin-bottom: 2px;
    }

    .stat-value {
      font-weight: 700;
      font-size: 14px;
    }

    .stat-value.cost { color: var(--yellow); }
    .stat-value.msgs { color: var(--blue); }
    .stat-value.burn { color: var(--peach); }
    .stat-value.plan { color: var(--lavender); font-size: 10px; }

    .footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--surface0);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer .source {
      color: var(--overlay0);
      font-size: 10px;
    }

    .footer .source span { color: var(--green); }

    .footer .updated {
      color: var(--overlay0);
      font-size: 10px;
    }

    .no-data {
      color: var(--overlay0);
      text-align: center;
      padding: 30px 0;
      font-size: 12px;
    }

    .no-data a {
      color: var(--blue);
      text-decoration: none;
    }

    .tier-badge {
      display: inline-block;
      background: var(--surface0);
      color: var(--peach);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .model-limits {
      margin-top: 8px;
    }

    .model-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 10px;
      color: var(--subtext0);
    }

    .model-row .name { color: var(--subtext1); }
    .model-row .val { color: var(--overlay0); }
  </style>
</head>
<body>
  <div class="header">
    <span class="fuel">&#9981;</span>
    <span class="title">AIFuel</span>
    <span class="version" id="version"></span>
  </div>

  <div id="content">
    <div class="no-data" id="no-data">
      Loading usage data...<br><br>
      Make sure you're logged into<br>
      <a href="https://claude.ai" target="_blank">claude.ai</a>
    </div>

    <div id="data" style="display:none">
      <div class="section-title">Rate Limits</div>
      <div id="limits"></div>

      <div class="section-title">Today</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Daily Cost</div>
          <div class="stat-value cost" id="cost">$0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Messages</div>
          <div class="stat-value msgs" id="msgs">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Burn Rate</div>
          <div class="stat-value burn" id="burn">$0.00/hr</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Plan</div>
          <div class="stat-value plan" id="plan">-</div>
        </div>
      </div>

      <div id="model-limits-section" style="display:none">
        <div class="section-title">Concurrency</div>
        <div class="model-limits" id="model-limits"></div>
      </div>

      <div class="footer">
        <div class="source">via <span id="source">-</span></div>
        <div class="updated" id="updated"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
